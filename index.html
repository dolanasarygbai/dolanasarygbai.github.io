<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Генеалогическое древо | Санчат | 6 поколений | Линии связей</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background-color: #0a0d12;
            color: #edf2f9;
            padding: 20px;
            overflow-x: auto;
            min-height: 100vh;
        }

        /* ОСНОВНОЙ МАКЕТ */
        .app {
            display: flex;
            gap: 25px;
            max-width: 100%;
        }

        /* КОНТЕЙНЕР ДЕРЕВА */
        .tree-section {
            flex: 3;
            background: #131a24;
            border-radius: 30px;
            padding: 40px 50px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.9);
            overflow-x: auto;
            overflow-y: auto;
            border: 1px solid #2e3f52;
        }

        .tree-canvas {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 70px;
            min-width: max-content;
            padding: 20px 0 40px;
        }

        /* РЯД ПОКОЛЕНИЯ */
        .generation {
            display: flex;
            justify-content: center;
            gap: 50px;
            position: relative;
            align-items: flex-end;
            min-height: 240px;
        }

        /* СПЕЦИАЛЬНЫЙ РЯД ДЛЯ 1 ПОКОЛЕНИЯ */
        .generation.first-gen {
            justify-content: space-between;
        }
        .gen-left, .gen-right {
            display: flex;
            gap: 60px;
        }

        /* СЕМЕЙНЫЙ КЛАСТЕР */
        .family-cluster {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            min-width: 200px;
        }

        /* ПАРА (СУПРУГИ) */
        .couple {
            display: flex;
            gap: 30px;
            align-items: center;
            position: relative;
            margin-bottom: 25px;
            padding: 0 20px;
        }
        /* ГОРИЗОНТАЛЬНАЯ ЛИНИЯ МЕЖДУ СУПРУГАМИ */
        .couple::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 3px;
            background: #7e96b0;
            transform: translateY(-50%);
            z-index: 5;
            border-radius: 4px;
            box-shadow: 0 0 8px rgba(126,150,176,0.5);
            transition: all 0.2s ease;
        }
        .couple.highlighted-connection::after {
            background: #ffffff;
            box-shadow: 0 0 20px #ffffff;
            height: 4px;
        }

        /* ВЕРТИКАЛЬНАЯ ЛИНИЯ ОТ ПАРЫ К ДЕТЯМ */
        .couple-to-children {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .couple-to-children::before {
            content: '';
            position: absolute;
            top: -20px;
            width: 3px;
            height: 40px;
            background: #7e96b0;
            z-index: 5;
            transition: all 0.2s ease;
        }
        .couple-to-children.highlighted-connection::before {
            background: #fff;
            box-shadow: 0 0 15px #fff;
        }

        /* РЯД ДЕТЕЙ */
        .children {
            display: flex;
            gap: 40px;
            justify-content: center;
            position: relative;
            margin-top: 15px;
            padding: 15px 0 0;
        }
        /* ГОРИЗОНТАЛЬНАЯ ЛИНИЯ МЕЖДУ ДЕТЬМИ (братья/сёстры) */
        .children::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10px;
            right: 10px;
            height: 3px;
            background: #7e96b0;
            z-index: 4;
            border-radius: 4px;
            transition: 0.2s;
        }
        .children.highlighted-connection::before {
            background: #fff;
            box-shadow: 0 0 18px #fff;
        }

        /* КАРТОЧКА ЧЕЛОВЕКА */
        .person {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 170px;
            padding: 15px 8px 12px;
            background: #1f2c3a;
            border-radius: 24px;
            border-width: 3px;
            border-style: solid;
            box-shadow: 0 12px 24px rgba(0,0,0,0.7);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            z-index: 30;
        }
        .person.father-side {
            border-color: #2d68c4;
            background: linear-gradient(145deg, #1f2d3d, #1a2532);
        }
        .person.mother-side {
            border-color: #b24fc9;
            background: linear-gradient(145deg, #2a1f30, #1f1825);
        }
        .person.highlighted {
            transform: scale(1.05);
            border-width: 4px;
            box-shadow: 0 0 40px currentColor;
            z-index: 50;
        }
        .person.father-side.highlighted {
            border-color: #5f9eff;
            box-shadow: 0 0 45px #2d68c4;
        }
        .person.mother-side.highlighted {
            border-color: #ea9eff;
            box-shadow: 0 0 45px #b24fc9;
        }

        .person-photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid currentColor;
            margin-bottom: 10px;
            background: #31435a;
        }

        .person-name {
            font-weight: 700;
            font-size: 0.95rem;
            text-align: center;
            color: #fff;
            word-break: break-word;
            margin-bottom: 5px;
        }

        .person-year {
            font-size: 0.8rem;
            color: #bcd0e8;
        }
        .person-year span::after {
            content: ' г.';
        }

        /* ИНФОПАНЕЛЬ */
        .info-panel {
            flex: 1.1;
            min-width: 340px;
            max-width: 440px;
            background: #17212b;
            border-radius: 32px;
            padding: 28px 22px;
            box-shadow: 0 20px 35px #000000b3;
            border-left: 6px solid;
            transition: border 0.2s;
            height: fit-content;
            position: sticky;
            top: 20px;
        }
        .info-panel.father-panel {
            border-left-color: #2d68c4;
        }
        .info-panel.mother-panel {
            border-left-color: #b24fc9;
        }

        .info-photo {
            width: 100%;
            max-height: 260px;
            object-fit: cover;
            border-radius: 28px;
            border: 4px solid #2e4258;
            cursor: pointer;
            transition: 0.2s;
        }
        .info-photo:hover {
            transform: scale(1.02);
            border-color: #5f7b9c;
        }

        .info-name {
            font-size: 2rem;
            font-weight: 800;
            margin: 20px 0 15px;
            color: #ffffff;
            line-height: 1.2;
        }

        .info-block {
            background: #1f2d3b;
            border-radius: 24px;
            padding: 20px;
            margin: 18px 0;
        }
        .info-block h3 {
            font-size: 1.3rem;
            color: #d2e2ff;
            border-bottom: 2px solid #3a5068;
            padding-bottom: 8px;
            margin-bottom: 16px;
        }
        .info-row {
            display: flex;
            margin: 12px 0;
        }
        .info-row strong {
            min-width: 130px;
            color: #ffffff;
            font-weight: 600;
        }
        .info-row span {
            color: #dae6fa;
        }

        .clickable {
            color: #7bb3ff;
            cursor: pointer;
            text-decoration: underline dotted;
        }
        .clickable:hover {
            color: #b3d4ff;
        }

        .note-global {
            margin-top: 25px;
            background: #1f1e16;
            padding: 18px 22px;
            border-radius: 60px;
            color: #fad98b;
            border: 1px solid #f0b347;
            font-style: italic;
        }

        /* МОДАЛКА ФОТО */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.96);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal img {
            max-width: 90vw;
            max-height: 90vh;
            border: 5px solid #fff;
            border-radius: 20px;
        }
        .modal-close {
            position: absolute;
            top: 30px; right: 50px;
            color: #fff;
            font-size: 50px;
            cursor: pointer;
        }

        .hint {
            text-align: center;
            color: #7e94b0;
            margin-top: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>

    add('saida', { name: 'Сарыгбай Саида', side: 'father', gen: 4, birth: '10.12.1964', photo: 'images/sarygbay_saida.png', parents: ['sanmaa'], info: { родство: 'Дочь Санмаа' } });

    // 5 ПОКОЛЕНИЕ
    add('dolana', { name: 'Сарыгбай Долана', side: 'father', gen: 5, birth: '23.09.1994', photo: 'images/dolana.jpg', parents: ['saida'], info: { родство: 'Дочь Саиды' } });
    add('choigaan', { name: 'Сарыгбай Чойгаана', side: 'father', gen: 5, birth: '10.11.1996', photo: 'images/choigaan.jpg', parents: ['saida'], info: { родство: 'Дочь Саиды' } });

    // 6 ПОКОЛЕНИЕ
    add('victoria', { name: 'Сарыгбай Виктория', side: 'father', gen: 6, birth: '', photo: 'images/victoria.jpg', parents: ['choigaan'], info: { родство: 'Дочь Чойгааны' } });

    // === СПИСОК СЕМЕЙ ДЛЯ ОТРИСОВКИ ЛИНИЙ ===
    const families = [
        { parents: ['yaar','sevil'], children: ['dozum','sirzhim'] },
        { parents: ['chambal','sagaan'], children: ['monke'] },
        { parents: ['chamyan','danzyn'], children: ['demchikkey'] },
        { parents: ['monke','dozum'], children: ['samdan','manchalmaa','sandan','shilimaa','sandal','suldum','sanmaa','tyvaa','bolat3','chagarmaa'] },
        { parents: ['demchikkey','azhykkay'], children: ['saadak','ayyyr','dapyyool','dungmai','okashtai','diimaa','khuurak','chazhilmaa','onermaa'] },
        { parents: ['sandan','okashtai'], children: ['viktor','suktar','bolat','kanool','valentina','boris','vladimir','alexander','alexey','olga'] },
        { parents: ['manchalmaa','maidyr'], children: ['monge','elizaveta','diizenmaa'] },
        { parents: ['sanmaa'], children: ['vladimir_kechil','bopuymaa','polum','chechena','fedor','misha','saida'] },
        { parents: ['saida'], children: ['dolana','choigaan'] },
        { parents: ['choigaan'], children: ['victoria'] }
    ];

    // === ПОСТРОЕНИЕ ДЕРЕВА С СЕМЕЙНЫМИ КЛАСТЕРАМИ ===
    function buildTree() {
        const canvas = document.getElementById('treeCanvas');
        canvas.innerHTML = '';

        // Сначала создадим простые карточки для всех (для навигации)
        // Но линии будем строить через семейные кластеры

        // Группируем семьи по поколению родителей
        const familiesByGen = {};
        families.forEach(f => {
            if (f.parents.length > 0) {
                const firstParent = people[f.parents[0]];
                if (firstParent) {
                    const gen = firstParent.gen;
                    if (!familiesByGen[gen]) familiesByGen[gen] = [];
                    familiesByGen[gen].push(f);
                }
            }
        });

        // Проходим по поколениям
        for (let g = 1; g <= 6; g++) {
            const row = document.createElement('div');
            row.className = 'generation' + (g === 1 ? ' first-gen' : '');

            if (g === 1) {
                // Для первого поколения отдельно выводим левую и правую группы
                const leftDiv = document.createElement('div');
                leftDiv.className = 'gen-left';
                const rightDiv = document.createElement('div');
                rightDiv.className = 'gen-right';

                // Отфильтруем людей 1-го поколения
                const gen1Ids = Object.values(people).filter(p => p.gen === 1).map(p => p.id);
                gen1Ids.forEach(id => {
                    const p = people[id];
                    const card = createPersonCard(id, p);
                    if (p.side === 'father') leftDiv.appendChild(card);
                    else rightDiv.appendChild(card);
                });

                row.appendChild(leftDiv);
                row.appendChild(rightDiv);
            } else {
                // Для остальных поколений — рисуем семейные кластеры
                const familiesHere = familiesByGen[g-1] || []; // родители из предыдущего поколения
                familiesHere.forEach(f => {
                    const cluster = document.createElement('div');
                    cluster.className = 'family-cluster';

                    // Супружеская пара
                    const coupleDiv = document.createElement('div');
                    coupleDiv.className = 'couple';
                    f.parents.forEach(pid => {
                        const p = people[pid];
                        if (p) coupleDiv.appendChild(createPersonCard(pid, p));
                    });
                    cluster.appendChild(coupleDiv);

                    // Вертикальная линия к детям
                    const verticalConnector = document.createElement('div');
                    verticalConnector.className = 'couple-to-children';
                    cluster.appendChild(verticalConnector);

                    // Дети
                    const childrenDiv = document.createElement('div');
                    childrenDiv.className = 'children';
                    f.children.forEach(cid => {
                        const child = people[cid];
                        if (child) childrenDiv.appendChild(createPersonCard(cid, child));
                    });
                    if (f.children.length > 0) cluster.appendChild(childrenDiv);

                    row.appendChild(cluster);
                });
            }
            canvas.appendChild(row);
        }

        // Сохраняем ссылки на все карточки
        window.personCards = {};
        document.querySelectorAll('.person').forEach(card => {
            const id = card.dataset.id;
            if (id) personCards[id] = card;
        });
    }

    function createPersonCard(id, p) {
        const div = document.createElement('div');
        div.className = `person ${p.side === 'father' ? 'father-side' : 'mother-side'}`;
        div.dataset.id = id;
        div.setAttribute('onclick', `selectPerson('${id}')`);

        const birthYear = p.birth ? p.birth.split('.').pop() : '';
        div.innerHTML = `
            <img class="person-photo" src="${p.photo || 'images/placeholder.jpg'}" alt="${p.name}" onerror="this.src='images/placeholder.jpg'">
            <div class="person-name">${p.name}</div>
            ${birthYear ? `<div class="person-year"><span>${birthYear}</span></div>` : ''}
        `;
        return div;
    }

    // === ВЫБОР ЧЕЛОВЕКА ===
    window.selectPerson = function(id) {
        const p = people[id];
        if (!p) return;

        // Сброс подсветки
        document.querySelectorAll('.person').forEach(c => c.classList.remove('highlighted'));
        document.querySelectorAll('.couple').forEach(c => c.classList.remove('highlighted-connection'));
        document.querySelectorAll('.couple-to-children').forEach(c => c.classList.remove('highlighted-connection'));
        document.querySelectorAll('.children').forEach(c => c.classList.remove('highlighted-connection'));

        // Подсветка выбранного человека
        if (personCards[id]) personCards[id].classList.add('highlighted');

        // Попытаемся подсветить линии, где этот человек является родителем или супругом
        families.forEach(f => {
            if (f.parents.includes(id)) {
                // Подсветить супружескую линию
                const coupleDivs = document.querySelectorAll('.couple');
                coupleDivs.forEach(couple => {
                    const cards = couple.querySelectorAll('.person');
                    if (cards.length >= 2) {
                        const ids = Array.from(cards).map(c => c.dataset.id);
                        if (ids.includes(id)) {
                            couple.classList.add('highlighted-connection');
                            // Подсветить вертикальную линию к детям
                            if (couple.nextElementSibling) {
                                couple.nextElementSibling.classList.add('highlighted-connection');
                                if (couple.nextElementSibling.nextElementSibling) {
                                    couple.nextElementSibling.nextElementSibling.classList.add('highlighted-connection');
                                }
                            }
                        }
                    }
                });
            }
            if (f.children.includes(id)) {
                // Подсветить линию детей
                const childrenDivs = document.querySelectorAll('.children');
                childrenDivs.forEach(children => {
                    const cards = children.querySelectorAll('.person');
                    const ids = Array.from(cards).map(c => c.dataset.id);
                    if (ids.includes(id)) {
                        children.classList.add('highlighted-connection');
                        // Подсветить родительскую линию
                        if (children.previousElementSibling && children.previousElementSibling.previousElementSibling) {
                            children.previousElementSibling.classList.add('highlighted-connection');
                            children.previousElementSibling.previousElementSibling.classList.add('highlighted-connection');
                        }
                    }
                });
            }
        });

        // Обновить инфопанель
        const panel = document.getElementById('infoPanel');
        panel.className = `info-panel ${p.side === 'father' ? 'father-panel' : 'mother-panel'}`;

        document.getElementById('infoPhoto').src = p.photo || 'images/placeholder.jpg';
        document.getElementById('infoName').innerText = p.name;

        let details = '<div class="info-block"><h3>📋 Данные</h3>';
        if (p.info) {
            for (let key in p.info) {
                details += `<div class="info-row"><strong>${key}:</strong> <span>${p.info[key]}</span></div>`;
            }
        }
        details += '</div>';

        // Родители
        if (p.parents && p.parents.length) {
            details += '<div class="info-block"><h3>👪 Родители</h3>';
            p.parents.forEach(pid => {
                const parent = people[pid];
                if (parent) {
                    details += `<div class="info-row"><strong>${parent.gender === 'm' ? 'Отец' : 'Мать'}:</strong> <span class="clickable" onclick="selectPerson('${pid}')">${parent.name}</span></div>`;
                }
            });
            details += '</div>';
        }

        // Дети
        const children = [];
        for (let pid in people) {
            const child = people[pid];
            if (child.parents && child.parents.includes(id)) children.push(child);
        }
        if (children.length) {
            details += '<div class="info-block"><h3>👶 Дети</h3>';
            children.forEach(ch => {
                details += `<div class="info-row"><span class="clickable" onclick="selectPerson('${ch.id}')">${ch.name}</span></div>`;
            });
            details += '</div>';
        }

        document.getElementById('infoDetails').innerHTML = details;
    };

    // Модальное окно
    window.openModal = function() {
        const modal = document.getElementById('photoModal');
        const modalImg = document.getElementById('modalImage');
        const infoPhoto = document.getElementById('infoPhoto');
        modalImg.src = infoPhoto.src;
        modal.style.display = 'flex';
    };

    // Старт
    window.onload = function() {
        buildTree();
        setTimeout(() => selectPerson('alexander'), 300);
    };
})();
</script>
