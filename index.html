<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Генеалогическое древо Санчат | 6 поколений</title>
    <style>
        /* === ОСНОВНЫЕ СТИЛИ === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background-color: #0c0f14;
            color: #f0f4fa;
            line-height: 1.5;
            min-height: 100vh;
            padding: 20px;
            overflow-x: auto;
        }

        /* МАКЕТ: дерево + панель */
        .layout {
            display: flex;
            gap: 25px;
            max-width: 100%;
            min-height: calc(100vh - 40px);
        }

        /* КОНТЕЙНЕР ДЕРЕВА */
        .tree-wrapper {
            flex: 3;
            background: #141a22;
            border-radius: 28px;
            padding: 40px 50px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.8);
            overflow-x: auto;
            overflow-y: auto;
            border: 1px solid #2f3b4b;
        }

        .tree-container {
            display: flex;
            flex-direction: column;
            gap: 70px;
            min-width: max-content;
            padding-bottom: 30px;
        }

        /* РЯД ПОКОЛЕНИЯ */
        .gen-row {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 45px;
            position: relative;
            padding: 20px 0;
        }

        /* ОСОБЫЙ РЯД ДЛЯ ПЕРВОГО ПОКОЛЕНИЯ (разделение на лево/право) */
        .gen-row.first-gen {
            justify-content: space-between;
        }
        .gen-row.first-gen .left-group,
        .gen-row.first-gen .right-group {
            display: flex;
            gap: 60px;
        }

        /* КАРТОЧКА ЧЕЛОВЕКА */
        .person-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 170px;
            padding: 16px 10px 12px;
            background: #1f2937;
            border-radius: 24px;
            border-width: 3px;
            border-style: solid;
            box-shadow: 0 12px 24px rgba(0,0,0,0.7);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            z-index: 20;
        }
        .person-card.father-side {
            border-color: #2d68c4;
            background: linear-gradient(145deg, #1f2a38, #19232f);
        }
        .person-card.mother-side {
            border-color: #b869cf;
            background: linear-gradient(145deg, #2a1f30, #221a28);
        }
        .person-card.highlighted {
            transform: scale(1.05);
            border-width: 4px;
            box-shadow: 0 0 35px currentColor;
            z-index: 40;
        }
        .person-card.father-side.highlighted {
            border-color: #5d9bff;
            box-shadow: 0 0 40px #2d68c4;
        }
        .person-card.mother-side.highlighted {
            border-color: #e599ff;
            box-shadow: 0 0 40px #b44bcf;
        }

        /* ФОТО-МИНИАТЮРА */
        .person-thumb {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid currentColor;
            margin-bottom: 12px;
            background: #2e3b4c;
        }

        .person-name {
            font-weight: 700;
            font-size: 0.95rem;
            text-align: center;
            color: #fff;
            word-break: break-word;
            margin-bottom: 4px;
        }

        .person-date {
            font-size: 0.8rem;
            color: #b4c8e0;
        }
        .person-date span::after {
            content: ' г.';
        }

        /* ЛИНИИ СВЯЗЕЙ (РИСУЕМ ЧЕРЕЗ ПСЕВДОЭЛЕМЕНТЫ) */
        .family-cluster {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .marriage-pair {
            display: flex;
            gap: 25px;
            align-items: center;
            position: relative;
            margin-bottom: 25px;
        }
        .marriage-pair::after {
            content: '';
            position: absolute;
            top: 50%;
            left: -15px;
            right: -15px;
            height: 3px;
            background: #7f8fa3;
            transform: translateY(-50%);
            z-index: 1;
            border-radius: 4px;
            transition: 0.2s;
        }
        .marriage-pair.highlighted-connection::after {
            background: #ffffff;
            box-shadow: 0 0 18px #fff;
        }

        .children-row {
            display: flex;
            gap: 40px;
            justify-content: center;
            position: relative;
            margin-top: 15px;
            padding-top: 20px;
        }
        .children-row::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            width: 3px;
            height: 30px;
            background: #7f8fa3;
            transform: translateX(-50%);
            transition: 0.2s;
        }
        .children-row.highlighted-connection::before {
            background: #fff;
            box-shadow: 0 0 15px #fff;
        }

        /* ИНФОРМАЦИОННАЯ ПАНЕЛЬ */
        .info-panel {
            flex: 1.1;
            min-width: 340px;
            max-width: 440px;
            background: #151f2b;
            border-radius: 32px;
            padding: 28px 22px;
            box-shadow: 0 20px 35px #00000080;
            border-left: 6px solid;
            transition: border 0.2s;
            height: fit-content;
            position: sticky;
            top: 20px;
        }
        .info-panel.father-panel {
            border-left-color: #2d68c4;
        }
        .info-panel.mother-panel {
            border-left-color: #b869cf;
        }

        .info-photo {
            width: 100%;
            max-height: 260px;
            object-fit: cover;
            border-radius: 28px;
            border: 4px solid #2b3b4e;
            cursor: pointer;
            transition: 0.2s;
            background: #2c3a4a;
        }
        .info-photo:hover {
            transform: scale(1.02);
            border-color: #6d8eb0;
        }

        .info-title {
            font-size: 2rem;
            font-weight: 800;
            margin: 20px 0 15px;
            color: #ffffff;
            line-height: 1.2;
        }

        .info-block {
            background: #1d2a38;
            border-radius: 24px;
            padding: 20px;
            margin: 18px 0;
        }
        .info-block h3 {
            font-size: 1.3rem;
            color: #cfdeff;
            border-bottom: 2px solid #35485d;
            padding-bottom: 8px;
            margin-bottom: 16px;
        }
        .info-row {
            display: flex;
            margin: 12px 0;
        }
        .info-row strong {
            min-width: 130px;
            color: #ffffff;
            font-weight: 600;
        }
        .info-row span {
            color: #d6e2f5;
        }

        .clickable-link {
            color: #7bb3ff;
            cursor: pointer;
            text-decoration: underline;
            text-decoration-style: dotted;
        }
        .clickable-link:hover {
            color: #b3d4ff;
        }

        .global-note {
            margin-top: 30px;
            background: #1e1c14;
            padding: 18px 22px;
            border-radius: 60px;
            color: #fadf9e;
            border: 1px solid #fdbb4c;
            font-style: italic;
            font-size: 0.95rem;
        }

        /* МОДАЛЬНОЕ ОКНО */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal img {
            max-width: 90vw;
            max-height: 90vh;
            border: 5px solid #fff;
            border-radius: 20px;
        }
        .modal-close {
            position: absolute;
            top: 30px; right: 50px;
            color: white;
            font-size: 50px;
            cursor: pointer;
        }

        /* ПОДВАЛ ДЛЯ НАВИГАЦИИ */
        .nav-hint {
            color: #7b8ea8;
            margin: 30px 0 10px;
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>

    // === ПОСТРОЕНИЕ ДЕРЕВА ===
    function renderTree() {
        const container = document.getElementById('treeContainer');
        container.innerHTML = '';

        // Группировка по поколениям
        const gens = {};
        for (let id in people) {
            const p = people[id];
            if (!p.gen) continue;
            if (!gens[p.gen]) gens[p.gen] = [];
            gens[p.gen].push(id);
        }

        // Словарь для быстрого доступа к DOM-элементам
        window.personElements = {};

        // Проходим по поколениям 1..6
        for (let g = 1; g <= 6; g++) {
            if (!gens[g]) continue;
            const row = document.createElement('div');
            row.className = 'gen-row' + (g === 1 ? ' first-gen' : '');

            if (g === 1) {
                // Первое поколение: делим на лево (отец) и право (мать)
                const leftDiv = document.createElement('div');
                leftDiv.className = 'left-group';
                const rightDiv = document.createElement('div');
                rightDiv.className = 'right-group';

                gens[1].forEach(id => {
                    const p = people[id];
                    const card = createPersonCard(id, p);
                    if (p.side === 'father') leftDiv.appendChild(card);
                    else rightDiv.appendChild(card);
                    personElements[id] = card;
                });
                row.appendChild(leftDiv);
                row.appendChild(rightDiv);
            } else {
                // Остальные поколения — просто все подряд
                gens[g].forEach(id => {
                    const p = people[id];
                    const card = createPersonCard(id, p);
                    row.appendChild(card);
                    personElements[id] = card;
                });
            }
            container.appendChild(row);
        }
    }

    function createPersonCard(id, p) {
        const div = document.createElement('div');
        div.className = `person-card ${p.side === 'father' ? 'father-side' : 'mother-side'}`;
        div.dataset.id = id;
        div.setAttribute('onclick', `selectPerson('${id}')`);

        const birthYear = p.birth ? p.birth.split('.').pop() : '';
        const imgSrc = p.photo || 'images/placeholder.jpg';

        div.innerHTML = `
            <img class="person-thumb" src="${imgSrc}" alt="${p.name}" onerror="this.src='images/placeholder.jpg'">
            <div class="person-name">${p.name}</div>
            ${birthYear ? `<div class="person-date"><span>${birthYear}</span></div>` : ''}
        `;
        return div;
    }

    // === ВЫБОР ЧЕЛОВЕКА (ОБНОВЛЕНИЕ ПАНЕЛИ) ===
    window.selectPerson = function(id) {
        const p = people[id];
        if (!p) return;

        // Сброс подсветки
        document.querySelectorAll('.person-card').forEach(c => c.classList.remove('highlighted'));
        if (personElements[id]) personElements[id].classList.add('highlighted');

        // Панель
        const panel = document.getElementById('infoPanel');
        panel.className = `info-panel ${p.side === 'father' ? 'father-panel' : 'mother-panel'}`;

        document.getElementById('infoPhoto').src = p.photo || 'images/placeholder.jpg';
        document.getElementById('infoName').innerText = p.name;

        let html = '<div class="info-block"><h3>📌 Данные</h3>';
        // Основные поля из p.info
        if (p.info) {
            for (let key in p.info) {
                html += `<div class="info-row"><strong>${key}:</strong> <span>${p.info[key]}</span></div>`;
            }
        }
        html += '</div>';

        // Родители
        if (p.parents && p.parents.length) {
            html += '<div class="info-block"><h3>👪 Родители</h3>';
            p.parents.forEach(pid => {
                const parent = people[pid];
                if (parent) {
                    html += `<div class="info-row"><strong>${parent.gender === 'm' ? 'Отец' : 'Мать'}:</strong> <span class="clickable-link" onclick="selectPerson('${pid}')">${parent.name}</span></div>`;
                }
            });
            html += '</div>';
        }

        // Дети (где этот человек — родитель)
        const children = [];
        for (let pid in people) {
            const child = people[pid];
            if (child.parents && child.parents.includes(id)) children.push(child);
        }
        if (children.length) {
            html += '<div class="info-block"><h3>👶 Дети</h3>';
            children.forEach(ch => {
                html += `<div class="info-row"><span class="clickable-link" onclick="selectPerson('${ch.id}')">${ch.name}</span></div>`;
            });
            html += '</div>';
        }

        document.getElementById('infoContent').innerHTML = html;
    };

    // Модальное окно для фото
    window.openPhotoModal = function() {
        const modal = document.getElementById('photoModal');
        const fullImg = document.getElementById('modalFullImage');
        const curPhoto = document.getElementById('infoPhoto').src;
        fullImg.src = curPhoto;
        modal.style.display = 'flex';
    };

    // Старт
    window.onload = function() {
        renderTree();
        setTimeout(() => selectPerson('alexander'), 300);
    };
})();
