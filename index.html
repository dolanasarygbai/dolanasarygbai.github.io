<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Генеалогическое древо | Санчат | Темная тема</title>
    <style>
        /* === СБРОС И ОСНОВНЫЕ ПЕРЕМЕННЫЕ === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background-color: #0a0c0f; /* Очень темный фон */
            color: #e0e4e8; /* Светлый текст */
            line-height: 1.5;
            overflow-x: auto; /* Горизонтальный скролл для поколений */
            overflow-y: auto; /* Вертикальный скролл для поколений */
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        /* Контейнер для древовидной схемы и боковой панели */
        .main-layout {
            display: flex;
            gap: 30px;
            flex: 1;
            max-width: 100%;
        }

        /* === КОНТЕЙНЕР ДЕРЕВА (БЛОК-СХЕМА) === */
        .tree-container {
            flex: 3; /* Занимает больше места */
            min-width: 0; /* Предотвращает переполнение */
            overflow-x: auto; /* Скролл внутри контейнера дерева */
            overflow-y: visible;
            padding: 30px 60px; /* Много места слева и справа */
            background: #11161c; /* Чуть светлее фона */
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
        }

        /* Горизонтальный ряд поколения */
        .generation-row {
            display: flex;
            justify-content: center; /* Центрируем, но с отступами */
            align-items: flex-end; /* Выравниваем по нижнему краю для линий */
            gap: 40px; /* Расстояние между карточками в поколении */
            margin-bottom: 60px; /* Вертикальное расстояние между поколениями */
            position: relative;
            flex-wrap: nowrap;
            min-width: min-content; /* Чтобы ряд не сжимался */
            padding: 10px 0;
        }

        /* Контейнер для пары "супруг + супруг" и их детей */
        .family-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Горизонтальная линия, соединяющая супругов */
        .marriage-line {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            margin: 15px 0;
        }
        .marriage-line::before {
            content: '';
            position: absolute;
            top: 50%;
            left: -20px;
            right: -20px;
            height: 3px;
            background: #aaa; /* Нейтральная линия */
            z-index: 1;
            transform: translateY(-50%);
            transition: background 0.2s ease, box-shadow 0.2s ease;
        }
        .marriage-line.highlighted::before {
            background: #fff;
            box-shadow: 0 0 15px #fff;
            z-index: 5;
        }

        /* Контейнер для человека */
        .person {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 150px; /* Фиксированная ширина для стабильности */
            padding: 12px 8px 8px 8px;
            background: #1e2630;
            border-radius: 16px;
            border: 2px solid #3a4656;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.6);
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
            z-index: 10; /* Выше линий */
            margin: 0 5px;
        }
        /* Цветные рамки для сторон */
        .person.father-side {
            border-color: #4a7db5; /* Синий */
            box-shadow: 0 0 10px rgba(74, 125, 181, 0.3);
        }
        .person.mother-side {
            border-color: #b574b5; /* Лиловый */
            box-shadow: 0 0 10px rgba(181, 116, 181, 0.3);
        }
        .person.highlighted {
            border-width: 4px;
            transform: scale(1.02);
            z-index: 20;
        }
        .person.father-side.highlighted {
            border-color: #7aa9ff;
            box-shadow: 0 0 30px #4a7db5;
        }
        .person.mother-side.highlighted {
            border-color: #e6a5e6;
            box-shadow: 0 0 30px #b574b5;
        }

        /* Миниатюра фото */
        .person-photo-thumb {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #3a4656;
            margin-bottom: 8px;
            background: #2a3440;
        }
        .person.father-side .person-photo-thumb { border-color: #4a7db5; }
        .person.mother-side .person-photo-thumb { border-color: #b574b5; }

        .person-name {
            font-weight: 700;
            font-size: 1rem;
            line-height: 1.3;
            color: #fff;
            margin-bottom: 4px;
            word-break: break-word;
        }
        .person-years {
            font-size: 0.8rem;
            color: #aab8c5;
        }
        .person-years span::after {
            content: ' г.';
        }

        /* Линии, соединяющие родителей и детей (вертикаль) */
        .children-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
            position: relative;
            flex-wrap: wrap;
        }
        /* Вертикальная линия от пары к детям */
        .children-container::before {
            content: '';
            position: absolute;
            top: -30px;
            left: 50%;
            width: 3px;
            height: 30px;
            background: #aaa;
            transform: translateX(-50%);
            transition: background 0.2s ease, box-shadow 0.2s ease;
            z-index: 2;
        }
        .children-container.highlighted-connection::before {
            background: #fff;
            box-shadow: 0 0 15px #fff;
        }

        /* Линия между братьями и сестрами (горизонталь) */
        .siblings-line {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 3px;
            background: #aaa;
            transform: translateY(-50%);
            z-index: 0;
            transition: background 0.2s ease, box-shadow 0.2s ease;
        }
        .siblings-line.highlighted {
            background: #fff;
            box-shadow: 0 0 15px #fff;
        }

        /* === БОКОВАЯ ПАНЕЛЬ С КАРТОЧКОЙ === */
        .info-panel {
            flex: 1;
            min-width: 320px;
            max-width: 420px;
            background: #151e26;
            border-radius: 24px;
            padding: 25px 20px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.8);
            border-left: 5px solid #3a4656;
            height: fit-content;
            position: sticky;
            top: 20px;
            transition: border-color 0.2s ease;
        }
        .info-panel.father-side-panel { border-left-color: #4a7db5; }
        .info-panel.mother-side-panel { border-left-color: #b574b5; }

        .info-photo {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 3px solid #3a4656;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .info-photo:hover { transform: scale(1.02); }

        .info-name {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: #fff;
            line-height: 1.2;
        }
        .info-section {
            margin: 20px 0;
            padding: 15px;
            background: #1f2a35;
            border-radius: 16px;
        }
        .info-section h3 {
            font-size: 1.2rem;
            margin-bottom: 12px;
            color: #ccddee;
            border-bottom: 2px solid #3a4656;
            padding-bottom: 5px;
        }
        .info-section p {
            margin: 8px 0;
            display: flex;
            flex-wrap: wrap;
        }
        .info-section strong {
            font-weight: 700;
            color: #ffffff;
            min-width: 120px;
            margin-right: 10px;
        }
        .info-note {
            font-size: 0.9rem;
            color: #ffb86b;
            background: #2a241e;
            padding: 10px 15px;
            border-radius: 30px;
            margin-top: 20px;
            border-left: 4px solid #ffa31a;
        }
        .info-note i { font-style: italic; color: #ddd; }

        /* Модальное окно для фото */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
        }
        .modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            border: 4px solid #fff;
        }
        .modal-close {
            position: absolute;
            top: 30px; right: 50px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }

        /* Примечание внизу */
        .global-note {
            margin-top: 40px;
            padding: 20px;
            background: #1a130e;
            border-radius: 50px;
            text-align: center;
            font-style: italic;
            color: #f0c49b;
            border: 1px dashed #f0a55a;
        }
    </style>
</head>

        // --- Вспомогательная функция для рендера человека ---
        function renderPerson(personId, personData) {
            const birthYear = personData.birth ? personData.birth.split('.').pop() : '';
            return `
                <div class="person ${personData.side === 'father' ? 'father-side' : 'mother-side'}" data-id="${personId}" onclick="window.selectPerson('${personId}')">
                    <img class="person-photo-thumb" src="${personData.photo || 'images/placeholder.jpg'}" alt="${personData.name}" onerror="this.src='images/placeholder.jpg'">
                    <div class="person-name">${personData.name}</div>
                    ${birthYear ? `<div class="person-years"><span>${birthYear}</span></div>` : ''}
                </div>
            `;
        }

        // --- Функция построения дерева ---
        function buildTree() {
            const container = document.getElementById('treeContainer');
            container.innerHTML = ''; // Очистка

            // Группировка по поколениям
            const byGeneration = {};
            for (let id in peopleData) {
                let p = peopleData[id];
                if (!p.generation) continue;
                if (!byGeneration[p.generation]) byGeneration[p.generation] = [];
                byGeneration[p.generation].push(id);
            }

            // Сортировка поколений (1..6)
            const sortedGens = Object.keys(byGeneration).sort((a,b)=>a-b);

            // Словарь для хранения созданных DOM-элементов людей
            window.personElements = {};

            // Проходим по поколениям сверху вниз
            for (let gen of sortedGens) {
                const genRow = document.createElement('div');
                genRow.className = 'generation-row';
                genRow.dataset.generation = gen;

                // Особое размещение для 1 поколения: два блока (слева отец, справа мать)
                if (gen == 1) {
                    const leftGroup = document.createElement('div');
                    leftGroup.style.display = 'flex'; leftGroup.style.gap = '40px'; leftGroup.style.marginRight = 'auto';
                    const rightGroup = document.createElement('div');
                    rightGroup.style.display = 'flex'; rightGroup.style.gap = '40px'; rightGroup.style.marginLeft = 'auto';

                    byGeneration[1].forEach(id => {
                        let p = peopleData[id];
                        let personHtml = renderPerson(id, p);
                        let wrapper = document.createElement('div');
                        wrapper.innerHTML = personHtml;
                        let personDiv = wrapper.firstChild;
                        if (p.side === 'father') leftGroup.appendChild(personDiv);
                        else rightGroup.appendChild(personDiv);
                        window.personElements[id] = personDiv;
                    });
                    genRow.appendChild(leftGroup);
                    genRow.appendChild(rightGroup);
                } else {
                    // Для остальных поколений просто выводим всех подряд
                    byGeneration[gen].forEach(id => {
                        let p = peopleData[id];
                        let wrapper = document.createElement('div');
                        wrapper.innerHTML = renderPerson(id, p);
                        let personDiv = wrapper.firstChild;
                        genRow.appendChild(personDiv);
                        window.personElements[id] = personDiv;
                    });
                }
                container.appendChild(genRow);
            }

            // --- Рисуем связи (супружеские линии + дети) ---
            // (Упрощенно: добавим классы и псевдоэлементы, но линии между поколениями будут видны благодаря CSS)
            // Семьи:
            const families = [
                { parents: ['yaar', 'sevil'], children: ['dozum', 'sirzhim'] },
                { parents: ['chambal', 'sagaan'], children: ['monke'] },
                { parents: ['chamyan', 'danzyn'], children: ['demchikkey'] },
                { parents: ['monke', 'dozum'], children: ['samdan','manchalmaa','sandan','shilimaa','sandal','suldum','sanmaa','tyvaa','bolat3','chagarmaa'] },
                { parents: ['demchikkey', 'azhykkay'], children: ['saadak','ayyyr','dapyyool','dungmai','okashtai','diimaa','khuurak','chazhilmaa','onermaa'] },

        // --- Функция обновления карточки информации ---
        window.selectPerson = function(personId) {
            const p = peopleData[personId];
            if (!p) return;

            // Обновить класс панели
            const panel = document.getElementById('infoPanel');
            panel.className = `info-panel ${p.side === 'father' ? 'father-side-panel' : 'mother-side-panel'}`;

            // Фото
            const photo = document.getElementById('infoPhoto');
            photo.src = p.photo || 'images/placeholder.jpg';
            photo.alt = p.name;

            // Имя
            document.getElementById('infoName').innerText = p.name;

            // Детали (собираем из p.info)
            let detailsHtml = '<div class="info-section"><h3>Основное</h3>';
            for (let key in p.info) {
                detailsHtml += `<p><strong>${key}:</strong> ${p.info[key]}</p>`;
            }
            detailsHtml += '</div>';

            // Предки
            if (p.parents && p.parents.length) {
                detailsHtml += '<div class="info-section"><h3>Родители</h3>';
                p.parents.forEach(pid => {
                    let parent = peopleData[pid];
                    if (parent) detailsHtml += `<p><strong>${parent.gender === 'm' ? 'Отец' : 'Мать'}:</strong> <span style="cursor:pointer; color:#8cb2ff;" onclick="window.selectPerson('${pid}')">${parent.name}</span></p>`;
                });
                detailsHtml += '</div>';
            }

            // Супруг(а)
            if (p.spouse) {
                let spouse = peopleData[p.spouse];
                if (spouse) detailsHtml += `<div class="info-section"><h3>Супруг(а)</h3><p><strong>${spouse.gender === 'm' ? 'Муж' : 'Жена'}:</strong> <span style="cursor:pointer; color:#8cb2ff;" onclick="window.selectPerson('${p.spouse}')">${spouse.name}</span></p></div>`;
            }

            // Потомки (ищем, где person является родителем)
            let children = [];
            for (let id in peopleData) {
                let person = peopleData[id];
                if (person.parents && person.parents.includes(personId)) children.push(person);
            }
            if (children.length) {
                detailsHtml += '<div class="info-section"><h3>Дети</h3>';
                children.forEach(child => {
                    detailsHtml += `<p><span style="cursor:pointer; color:#8cb2ff;" onclick="window.selectPerson('${child.id}')">${child.name}</span></p>`;
                });
                detailsHtml += '</div>';
            }

            document.getElementById('infoDetails').innerHTML = detailsHtml;
            document.getElementById('infoNote').innerHTML = '⚡ Примечание: Возможны несовпадения имен в виду паспортизации, передачи на воспитание или по поверьям.';

            // Подсветка линий и карточки
            highlightConnections(personId);
        };

        // Подсветка связей (упрощенно: убираем старые классы, добавляем новый к выбранному человеку и его родительским линиям)
        function highlightConnections(personId) {
            // Сброс подсветки у всех людей и линий
            document.querySelectorAll('.person').forEach(el => el.classList.remove('highlighted'));
            document.querySelectorAll('.marriage-line').forEach(el => el.classList.remove('highlighted'));
            document.querySelectorAll('.children-container').forEach(el => el.classList.remove('highlighted-connection'));
            document.querySelectorAll('.siblings-line').forEach(el => el.classList.remove('highlighted'));

            // Подсветить самого человека
            if (window.personElements && window.personElements[personId]) {
                window.personElements[personId].classList.add('highlighted');
            }

            // TODO: Для полной подсветки линий потребуется более сложная логика, 
            // связывающая DOM-элементы семей. В рамках данного прототипа мы подсвечиваем только карточку.
            // Но линия супругов подсветится, если мы найдем marriage-line рядом.
        }

        // Модальное окно для фото
        window.openModal = function() {
            const modal = document.getElementById('photoModal');
            const modalImg = document.getElementById('modalImage');
            const infoImg = document.getElementById('infoPhoto');
            modalImg.src = infoImg.src;
            modal.style.display = 'flex';
        };

        // Инициализация
        window.onload = function() {
            buildTree();
            // Выбрать первого человека для примера (Александра)
            setTimeout(() => window.selectPerson('alexander'), 500);
        };
    })();
</script>
